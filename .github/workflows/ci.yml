name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一 ref 上新 push 到来时取消尚在跑的过时 CI（PR 连续 push 常见）——省算力/排队。
# 该仓 CI 无发布/部署副作用（release 是独立 workflow），故可直接 cancel 过时 run。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Self checks out into a named subdir + aster-lang-core checks out
      # as a sibling so locales/en's verifyLexiconParity can resolve the
      # core builtin copy at ../../../aster-lang-core (relative to
      # locales/en/). This mirrors the layout the parity gate repos use.
      - uses: actions/checkout@v6
        with:
          path: aster-lang-locales

      # Shared version catalog (ADR 0012). Published into Maven Local so
      # the catalog import in settings.gradle resolves without a GitHub
      # Packages round-trip.
      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-platform
          path: aster-lang-platform
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      # 防漂移 gate（ADR 0023 阶段6）：双制品仓，校验 Maven(catalog-derived) + npm 两个 artifact。
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - name: Release-plan drift gate
        run: |
          for ID in locales:maven locales:npm; do
            python3 aster-lang-platform/scripts/release-plan/check-artifact.py \
              --plan aster-lang-platform/release-plan.json --artifact "$ID" --repo-root aster-lang-locales
          done

      # 跨仓 PR 分支匹配：core 存在同名分支（如 fix/lexicon-hi-guard）时用之，
      # 否则回退 main。让引入新 keyword（如 APPLY）的语言包 PR 能对 companion
      # core PR 分支联合验证，而非总是拿 core main（否则 verifyLexiconKeywordParity
      # 会因 core main backbone 尚无该 keyword 而误报 drift）。
      - name: Resolve core ref (branch-matched)
        id: core-ref
        env:
          HEAD_REF: ${{ github.head_ref }}
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN || github.token }}
        run: |
          set -euo pipefail
          ref="main"
          if [ -n "${HEAD_REF:-}" ] && \
             gh api "repos/aster-cloud/aster-lang-core/branches/${HEAD_REF}" >/dev/null 2>&1; then
            ref="$HEAD_REF"
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "core ref = $ref"

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-core
          path: aster-lang-core
          ref: ${{ steps.core-ref.outputs.ref }}
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      # Publish the version catalog + core to Maven Local — the three
      # locale packs depend on cloud.aster-lang:aster-lang-core (version
      # via the catalog) at compile time.
      - name: Publish version catalog to Maven Local
        working-directory: aster-lang-platform
        run: ./gradlew publishToMavenLocal
      - name: Publish core to Maven Local
        working-directory: aster-lang-core
        run: ./gradlew publishToMavenLocal -x test

      - name: Build & Test (all 3 modules)
        working-directory: aster-lang-locales
        run: ./gradlew build
