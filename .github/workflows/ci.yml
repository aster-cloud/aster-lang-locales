name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一 ref 上新 push 到来时取消尚在跑的过时 CI（PR 连续 push 常见）——省算力/排队。
# 该仓 CI 无发布/部署副作用（release 是独立 workflow），故可直接 cancel 过时 run。
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      pull-requests: read
    # 值级词法守门（verify:lexicon-sync）需 gradle 拉跨仓 GitHub Packages（含 hi 包）。
    # CROSS_REPO_TOKEN 是 org secret；此处供 gradle credentials + gh api 分支匹配。
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.CROSS_REPO_TOKEN || github.token }}
      GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN || github.token }}
    steps:
      # Self checks out into a named subdir + aster-lang-core checks out
      # as a sibling so locales/en's verifyLexiconParity can resolve the
      # core builtin copy at ../../../aster-lang-core (relative to
      # locales/en/). This mirrors the layout the parity gate repos use.
      - uses: actions/checkout@v6
        with:
          path: aster-lang-locales

      # 词法值同步守门（High#3）只在 lexicon 相关变更或 main push 时跑：改 zh/de/en.json
      # 的 keyword 值（键集不变但值漂移）verifyLexiconKeywordParity 抓不到，只有下方
      # verify:lexicon-sync 的 Java↔TS 同 locale 值比对能抓。其余改动跳过这条重链。
      # self 在子目录，paths-filter 需 working-directory 指向它。
      - name: Detect lexicon-sync relevant changes
        id: changed
        uses: dorny/paths-filter@v4
        with:
          working-directory: aster-lang-locales
          filters: |
            lexicon_sync:
              - '.github/workflows/**'
              - '**/build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle/**'
              - 'gradlew'
              - 'locales/*/src/main/resources/lexicons/**/*.json'
              - 'locales/*/src/main/resources/META-INF/services/**'
              - 'locales/*/src/main/java/**'

      # Shared version catalog (ADR 0012). Published into Maven Local so
      # the catalog import in settings.gradle resolves without a GitHub
      # Packages round-trip.
      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-platform
          path: aster-lang-platform
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      # 防漂移 gate（ADR 0023 阶段6）：双制品仓，校验 Maven(catalog-derived) + npm 两个 artifact。
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - name: Release-plan drift gate
        run: |
          for ID in locales:maven locales:npm; do
            python3 aster-lang-platform/scripts/release-plan/check-artifact.py \
              --plan aster-lang-platform/release-plan.json --artifact "$ID" --repo-root aster-lang-locales
          done

      # 跨仓 PR 分支匹配：companion 仓存在同名分支（如 fix/lexicon-hi-guard）时用之，
      # 否则回退 main。让引入新 keyword（如 APPLY）的语言包 PR 能对 companion core/
      # hi/ts PR 分支联合验证，而非总拿各自 main（否则 verifyLexiconKeywordParity /
      # verify:lexicon-sync 因 backbone 尚无该 keyword 而误报 drift）。一次解析全部
      # sibling ref，避免每仓一个 step。
      - name: Resolve sibling refs (branch-matched)
        id: refs
        shell: bash
        # head_ref 经 env 传入（不内插进脚本），避免分支名注入（actionlint 安全实践）。
        env:
          OWNER: ${{ github.repository_owner }}
          CANDIDATE: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          # 单引号 GraphQL 查询串故意不做 shell 展开（变量经 -f 参数传入）。
          # shellcheck disable=SC2016
          GQL='query($owner:String!,$name:String!,$branch:String!){repository(owner:$owner,name:$name){ref(qualifiedName:$branch){name}}}'
          resolve_ref() {
            local key="$1" repo="$2" found=""
            if [ -n "${CANDIDATE:-}" ]; then
              found="$(gh api graphql \
                -f owner="$OWNER" -f name="$repo" -f branch="refs/heads/${CANDIDATE}" \
                -f query="$GQL" \
                --jq '.data.repository.ref.name // empty' 2>/dev/null || true)"
            fi
            if [ -n "$found" ]; then
              echo "${key}=${CANDIDATE}" >> "$GITHUB_OUTPUT"
            else
              echo "${key}=main" >> "$GITHUB_OUTPUT"
            fi
            echo "${repo} ref = ${found:-main}"
          }
          resolve_ref core_ref aster-lang-core
          resolve_ref hi_ref aster-lang-hi
          resolve_ref ts_ref aster-lang-ts

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-core
          path: aster-lang-core
          ref: ${{ steps.refs.outputs.core_ref }}
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      # Publish the version catalog + core to Maven Local — the three
      # locale packs depend on cloud.aster-lang:aster-lang-core (version
      # via the catalog) at compile time.
      - name: Publish version catalog to Maven Local
        working-directory: aster-lang-platform
        run: ./gradlew publishToMavenLocal
      - name: Publish core to Maven Local
        working-directory: aster-lang-core
        run: ./gradlew publishToMavenLocal -x test

      - name: Build & Test (all 3 modules)
        working-directory: aster-lang-locales
        run: ./gradlew build

      # ─── 值级词法同步守门（verify:lexicon-sync）───
      # exportLexicons 要看到全部 first-party 语言包（en/zh/de + hi）才能校验完整，
      # 故 checkout+publish 本仓 locales 与 hi；再由 TS verify-lexicon-sync 校验 Java
      # 导出词法表与 TS 内置词法逐 locale 逐字段同值（键集校验之外的值守门）。
      - name: Checkout aster-lang-hi
        if: github.event_name == 'push' || steps.changed.outputs.lexicon_sync == 'true'
        uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-hi
          path: aster-lang-hi
          ref: ${{ steps.refs.outputs.hi_ref }}
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - name: Checkout aster-lang-ts
        if: github.event_name == 'push' || steps.changed.outputs.lexicon_sync == 'true'
        uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-ts
          path: aster-lang-ts
          ref: ${{ steps.refs.outputs.ts_ref }}
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - name: Setup pnpm
        if: github.event_name == 'push' || steps.changed.outputs.lexicon_sync == 'true'
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node
        if: github.event_name == 'push' || steps.changed.outputs.lexicon_sync == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: aster-lang-ts/pnpm-lock.yaml

      - name: Build aster-lang-ts
        if: github.event_name == 'push' || steps.changed.outputs.lexicon_sync == 'true'
        working-directory: aster-lang-ts
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Verify lexicon value sync (Java exportLexicons ↔ TS)
        if: github.event_name == 'push' || steps.changed.outputs.lexicon_sync == 'true'
        shell: bash
        run: |
          set -euo pipefail
          # first-party 语言包（en/zh/de + hi）发布到 Maven Local，供 exportLexicons 的
          # SPI langPacks classpath 发现；否则导出集塌成 [en] 无法校验 hi/zh/de 值。
          (cd aster-lang-locales && ./gradlew publishToMavenLocal -x test)
          (cd aster-lang-hi && ./gradlew publishToMavenLocal -x test)
          (cd aster-lang-core && ./gradlew exportLexicons -x test)
          node aster-lang-ts/dist/scripts/verify-lexicon-sync.js \
            aster-lang-core/build/generated/lexicons/lexicons.json
