name: Release

# Publishes all three first-party locale packs (en/zh/de) to GitHub Packages
# on a v* tag. Consolidated home per ADR-0011 — these coordinates
# (cloud.aster-lang:aster-lang-{en,zh,de}) are now published from THIS repo,
# not the deprecated standalone aster-lang-en/-zh/-de repos.
#
# Layout mirrors ci.yml: this repo checks out into aster-lang-locales/ and
# aster-lang-core / aster-lang-platform check out as siblings so the
# verifyLexiconParity / verifyLexiconKeywordParity gates can resolve the core
# backbone at ../../../aster-lang-core (relative to locales/<id>/).

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          path: aster-lang-locales

      # Shared version catalog (aster-lang-platform, ADR 0012) — settings.gradle
      # imports it; must land in Maven Local before any module build resolves
      # asterLibs.*.
      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-platform
          path: aster-lang-platform
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-core
          path: aster-lang-core
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      # 版本目录（platform）必须先进 mavenLocal —— settings.gradle.kts 通过
      # from("...aster-lang-platform:X") 导入它；否则后续任何 Gradle 调用（含下方
      # Verify 的 :en:properties）都无法解析 catalog → 配置失败 → 空 version。
      # （此前 Verify 在本步之前，CI 上 :en:properties 拿到空版本号，guard 误判。）
      - name: Publish version catalog to Maven Local
        working-directory: aster-lang-platform
        run: ./gradlew publishToMavenLocal

      - name: Publish core to Maven Local
        working-directory: aster-lang-core
        run: ./gradlew publishToMavenLocal -x test

      # Tag↔version guard: the v* tag must match the version the subprojects
      # publish (subprojects { version = ... } in build.gradle.kts). Stops a
      # mistagged release from publishing the wrong GAV.
      - name: Verify tag matches project version
        working-directory: aster-lang-locales
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PROJECT_VERSION="$(./gradlew -q :en:properties --no-daemon \
            | awk -F': ' '/^version:/ {print $2; exit}')"
          echo "tag=$TAG  projectVersion=$PROJECT_VERSION"
          if [ "$TAG" != "$PROJECT_VERSION" ]; then
            echo "::error::Tag v$TAG does not match project version $PROJECT_VERSION. Bump build.gradle.kts or fix the tag."
            exit 1
          fi

      - name: Build & Test (all 3 modules)
        working-directory: aster-lang-locales
        run: ./gradlew build

      # 注：不再从本仓发布 en/zh/de 的 Maven jar。
      # cloud.aster-lang:aster-lang-{en,zh,de} 这三个 Maven 包**归属于历史的
      # aster-lang-en/zh/de 仓**（1.0.0–1.0.2 均由那些仓发布）。GitHub Packages
      # 不允许从不同源仓发布同名包 → 422 Unprocessable Entity。ADR 0011 的"发布层
      # 接管"在 Maven 通道上从未真正落地。而界面文案（ui-messages）按 ADR 0018 走
      # **独立 npm 通道、不进 JVM jar**，aster-api 也改为从 npm 包加载 ui-messages
      # （不再依赖语言包 jar 携带该资源）。故此处只发 npm，不发 en/zh/de Maven。

      # ── ui-messages manifest npm 通道（ADR 0018 统一语言包 Phase 1）──
      # 界面文案聚合产物走独立 npm 包(@aster-cloud/ui-messages)，不进 JVM jar。
      # exportUiMessages 由上面的 `build` 已跑过(parity 校验亦在其中)；prepack
      # 再跑一次确保产物最新，然后 npm publish 到 GitHub Packages npm registry。
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@aster-cloud'

      - name: Publish @aster-cloud/ui-messages to GitHub Packages (npm)
        working-directory: aster-lang-locales/ui-messages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
