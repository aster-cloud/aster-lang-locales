name: Release

# Publishes all three first-party locale packs (en/zh/de) to GitHub Packages
# on a v* tag. Consolidated home per ADR-0011 — these coordinates
# (cloud.aster-lang:aster-lang-{en,zh,de}) are now published from THIS repo,
# not the deprecated standalone aster-lang-en/-zh/-de repos.
#
# Layout mirrors ci.yml: this repo checks out into aster-lang-locales/ and
# aster-lang-core / aster-lang-platform check out as siblings so the
# verifyLexiconParity / verifyLexiconKeywordParity gates can resolve the core
# backbone at ../../../aster-lang-core (relative to locales/<id>/).

on:
  push:
    tags: ['v*']
  # orchestrator 入口：dispatch 只创建 tag（CROSS_REPO_TOKEN/PAT），真正发布走 tag-push。
  # 本仓双制品：Maven lexicon(catalog-derived=asterLang) + npm @aster-cloud/ui-messages
  # (literal)。tag 代表主 release line = Maven/catalog version；npm version 由 publish
  # 内部 gate 单独校验，不和 tag 比。详见 ADR 0023 阶段2。
  workflow_dispatch:
    inputs:
      version:
        description: 'Maven/catalog 主版本（不含 v；= release-plan ecosystemVersion）'
        required: true
        type: string
      artifactIds:
        required: false
        type: string
      trainId:
        required: false
        type: string

concurrency:
  group: release-${{ github.repository }}-${{ inputs.version && format('v{0}', inputs.version) || github.ref_name }}
  cancel-in-progress: false

jobs:
  # dispatch 路径：仅创建 tag。catalog-derived 版本用 Gradle 解析（不能 sed 字面量）。
  create-tag:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          fetch-depth: 0
      # catalog 来自 cloud.aster-lang:aster-lang-platform（GH Packages），但 settings
      # 只声明 mavenLocal()+mavenCentral()。干净 runner 无法在 settings 评估阶段解析
      # catalog → 先 checkout platform 并 publishToMavenLocal（同 publish job 的 bootstrap），
      # 之后本仓 Gradle 才能解析 catalog-derived version。
      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-platform
          path: aster-lang-platform
          token: ${{ secrets.CROSS_REPO_TOKEN }}
      - uses: actions/setup-java@v5
        with: { java-version: '25', distribution: 'temurin' }
      - name: Bootstrap version catalog to Maven Local
        run: cd aster-lang-platform && ./gradlew publishToMavenLocal
      - name: Verify version & create tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          # catalog-derived：version = asterLibs.findVersion("asterLang")。用 Gradle 解析
          # 实际 project version（:en 子项目代表整组），不读字面量。
          RESOLVED=$(./gradlew -q :en:properties | sed -n 's/^version: //p' | head -n1)
          if [ "$VERSION" != "$RESOLVED" ]; then
            echo "::error::dispatch version ($VERSION) != Gradle-resolved catalog version ($RESOLVED)"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags origin
          TAG="v${VERSION}"
          if git show-ref --verify --quiet "refs/tags/$TAG"; then
            TAG_SHA=$(git rev-list -n1 "$TAG"); HEAD_SHA=$(git rev-parse HEAD)
            if [ "$TAG_SHA" = "$HEAD_SHA" ]; then
              echo "::notice::$TAG already on this commit → no-op (idempotent)"; exit 0
            fi
            echo "::error::$TAG exists but points to $TAG_SHA, not HEAD $HEAD_SHA"; exit 1
          fi
          git tag "$TAG"
          git push origin "$TAG"

  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # OIDC Trusted Publishing：@aster-cloud/ui-messages 发公共 npm 用 OIDC
      # （同 @aster-cloud/aster-lang-ts，无 NPM_TOKEN）。需在 npmjs.com 为该包配置
      # Trusted Publisher（关联本仓 + 本 workflow）。
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          path: aster-lang-locales

      # Shared version catalog (aster-lang-platform, ADR 0012) — settings.gradle
      # imports it; must land in Maven Local before any module build resolves
      # asterLibs.*.
      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-platform
          path: aster-lang-platform
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - uses: actions/checkout@v6
        with:
          repository: aster-cloud/aster-lang-core
          path: aster-lang-core
          token: ${{ secrets.CROSS_REPO_TOKEN || github.token }}

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      # 版本目录（platform）必须先进 mavenLocal —— settings.gradle.kts 通过
      # from("...aster-lang-platform:X") 导入它；否则后续任何 Gradle 调用（含下方
      # Verify 的 :en:properties）都无法解析 catalog → 配置失败 → 空 version。
      # （此前 Verify 在本步之前，CI 上 :en:properties 拿到空版本号，guard 误判。）
      - name: Publish version catalog to Maven Local
        working-directory: aster-lang-platform
        run: ./gradlew publishToMavenLocal

      - name: Publish core to Maven Local
        working-directory: aster-lang-core
        run: ./gradlew publishToMavenLocal -x test

      # Tag↔version guard: the v* tag must match the version the subprojects
      # publish (subprojects { version = ... } in build.gradle.kts). Stops a
      # mistagged release from publishing the wrong GAV.
      - name: Verify tag matches project version
        working-directory: aster-lang-locales
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PROJECT_VERSION="$(./gradlew -q :en:properties --no-daemon \
            | awk -F': ' '/^version:/ {print $2; exit}')"
          echo "tag=$TAG  projectVersion=$PROJECT_VERSION"
          if [ "$TAG" != "$PROJECT_VERSION" ]; then
            echo "::error::Tag v$TAG does not match project version $PROJECT_VERSION. Bump build.gradle.kts or fix the tag."
            exit 1
          fi

      - name: Build & Test (all 3 modules)
        working-directory: aster-lang-locales
        run: ./gradlew build

      # 发布 lexicon SPI 包到 GitHub Packages Maven —— **新坐标**
      # cloud.aster-lang:aster-lang-locales-{en,zh,de}。
      # 老坐标 cloud.aster-lang:aster-lang-{en,zh,de} 归属已归档的 aster-lang-en/zh/de
      # 仓（GitHub Packages 包名按首发仓归属，从本仓发同名包 → 422）。ADR 0011 的
      # "发布层接管"因此在 Maven 通道从未落地。现迁到 locales 自有的新坐标（同 hi 用
      # 独立坐标 aster-lang-hi 的先例），彻底脱离归档仓 → 随生态版本级联无阻。
      - name: Publish lexicon packs to GitHub Packages (new coordinates)
        working-directory: aster-lang-locales
        run: ./gradlew :en:publish :zh:publish :de:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── ui-messages manifest npm 通道（ADR 0018 统一语言包 Phase 1）──
      # 界面文案聚合产物走独立 npm 包(@aster-cloud/ui-messages)，不进 JVM jar。
      # 发到**公共 npm**（与 @aster-cloud/aster-lang-ts/tokens 同 registry），
      # 让 aster-cloud 的 CI + Cloudflare Workers 构建免 GitHub Packages 认证即可消费。
      # exportUiMessages 由上面的 `build` 已跑过(parity 校验亦在其中)；prepack
      # 再跑一次确保产物最新，然后 npm publish。
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@aster-cloud'

      # 经 OIDC Trusted Publisher 发布（--provenance），无 token。幂等：同版本已发布
      # 时 npm 报 "cannot publish over the previously published versions" 非真失败
      # （重跑 release / 只改 Maven 坐标时 ui-messages 版本未变），容忍之。
      # 注意用 `set -o pipefail` 让 npm 的非零退出穿透 tee，避免真失败被 tee 掩盖。
      - name: Publish @aster-cloud/ui-messages to public npm (Trusted Publisher)
        working-directory: aster-lang-locales/ui-messages
        run: |
          set -o pipefail
          if npm publish --provenance --access public 2>&1 | tee /tmp/npm.log; then
            echo "ui-messages published"
          elif grep -q "cannot publish over the previously published versions" /tmp/npm.log; then
            echo "ui-messages 同版本已发布，跳过（幂等）"
          else
            echo "npm publish 真失败"; exit 1
          fi
